// ========== 2. 輔助函式 ==========
function shapeSVG(shape, color, size = 28) {
  const c = color;
  if (shape === 'meteor') {
    return `<svg width="${size}" height="${size}" viewBox="0 0 32 32">
      <circle cx="20" cy="12" r="6" fill="${c}" />
      <circle cx="10" cy="22" r="2" fill="${c}" opacity="0.6"/>
      <circle cx="6" cy="26" r="1" fill="${c}" opacity="0.4"/>
    </svg>`;
  } else if (shape === 'comet') {
    return `<svg width="${size}" height="${size}" viewBox="0 0 32 32">
      <path d="M16 4 L19 13 L28 16 L19 19 L16 28 L13 19 L4 16 L13 13 Z" fill="${c}" />
    </svg>`;
  } else {
    return `<svg width="${size}" height="${size}" viewBox="0 0 32 32">
      <circle cx="16" cy="16" r="11" fill="none" stroke="${c}" stroke-width="3"/>
      <circle cx="16" cy="16" r="5" fill="${c}" opacity="0.85"/>
    </svg>`;
  }
}

function buildDeck() {
  const cards = [];
  let id = 0;
  for (const e of ENERGIES)
    for (const s of SHAPES)
      for (let i = 0; i < 6; i++)
        cards.push({ uid: id++, energy: e.id, shape: s.id });
  return cards;
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function drawN(g, n) {
  const out = [];
  for (let i = 0; i < n; i++) {
    if (g.deck.length === 0) {
      if (g.discard.length === 0) break;
      g.deck = shuffle(g.discard.slice());
      g.discard = [];
      log('系統：牌庫用完，將棄牌堆重新洗牌。', 'system');
    }
    out.push(g.deck.shift());
  }
  return out;
}

function refillReserve() {
  if (!G || !G.reserve) return;
  while (G.reserve.length < 3) {
    const d = drawN(G, 1);
    if (!d.length) break;
    G.reserve.push(d[0]);
  }
}

function makeEmptyGrid() {
  return [[null,null,null],[null,null,null],[null,null,null]];
}

function cardLabel(card) {
  return `${SHAPE_BY[card.shape].name}/${ENERGY_BY[card.energy].name}`;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ========== 3. 消除偵測（V4 形狀模式）==========
function findMatchesInGrid(grid) {
  const used = new Array(9).fill(false);
  const results = [];
  for (const pat of ELIM_PATTERNS) {
    let energy = null, ok = true;
    for (const [r, c] of pat.cells) {
      if (used[r * 3 + c]) { ok = false; break; }
      const card = grid[r] && grid[r][c];
      if (!card) { ok = false; break; }
      if (energy === null) energy = card.energy;
      else if (card.energy !== energy) { ok = false; break; }
    }
    if (ok && energy !== null) {
      results.push({ ...pat, energy, cells: pat.cells.slice() });
      for (const [r, c] of pat.cells) used[r * 3 + c] = true;
    }
  }
  return results;
}

// ========== 4. 任務輔助函式 ==========
function maxShapeCount(hand) {
  const m = {};
  hand.forEach(c => m[c.shape] = (m[c.shape] || 0) + 1);
  return Math.max(0, ...Object.values(m));
}
function maxColorInAnyGrid(g, p) {
  const grids = [G.centralGrid, p.personalGrid].filter(Boolean);
  let best = 0;
  for (const grid of grids) {
    const counts = {};
    for (let r = 0; r < 3; r++)
      for (let c = 0; c < 3; c++)
        if (grid[r][c]) counts[grid[r][c].energy] = (counts[grid[r][c].energy] || 0) + 1;
    const mx = Math.max(0, ...Object.values(counts));
    if (mx > best) best = mx;
  }
  return best;
}
function maxEnergiesInAnyGrid(g, p) {
  const grids = [G.centralGrid, p.personalGrid].filter(Boolean);
  let best = 0;
  for (const grid of grids) {
    const s = new Set();
    for (let r = 0; r < 3; r++)
      for (let c = 0; c < 3; c++)
        if (grid[r][c]) s.add(grid[r][c].energy);
    if (s.size > best) best = s.size;
  }
  return best;
}

// ========== 5. 填牌（初始化星陣）==========
function fillGrid(grid) {
  // 逐格填入，若立即觸發消除則丟棄並重補
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      let placed = false, tries = 0;
      while (!placed && tries < 50) {
        tries++;
        const d = drawN(G, 1);
        if (!d.length) { placed = true; break; }
        grid[r][c] = d[0];
        if (findMatchesInGrid(grid).length > 0) {
          G.discard.push(grid[r][c]);
          grid[r][c] = null;
        } else {
          placed = true;
        }
      }
    }
  }
}

// 推入 3×3 星陣（dir: down/up/left/right, idx: col for down/up, row for left/right）
function pushIntoGrid3x3(grid, card, dir, idx) {
  const isCentral = (grid === G.centralGrid);
  const m = isCentral ? G.centralMarkers : null;
  let pushedOut = null;
  if (dir === 'down') {
    pushedOut = grid[2][idx];
    for (let r = 2; r > 0; r--) { grid[r][idx] = grid[r-1][idx]; if (m) m[r][idx] = m[r-1][idx]; }
    grid[0][idx] = card;
    if (m) m[0][idx] = null; // 新推入格無標記（之後由 onPushClick 詢問是否放）
  } else if (dir === 'up') {
    pushedOut = grid[0][idx];
    for (let r = 0; r < 2; r++) { grid[r][idx] = grid[r+1][idx]; if (m) m[r][idx] = m[r+1][idx]; }
    grid[2][idx] = card;
    if (m) m[2][idx] = null;
  } else if (dir === 'right') {
    pushedOut = grid[idx][2];
    for (let c = 2; c > 0; c--) { grid[idx][c] = grid[idx][c-1]; if (m) m[idx][c] = m[idx][c-1]; }
    grid[idx][0] = card;
    if (m) m[idx][0] = null;
  } else if (dir === 'left') {
    pushedOut = grid[idx][0];
    for (let c = 0; c < 2; c++) { grid[idx][c] = grid[idx][c+1]; if (m) m[idx][c] = m[idx][c+1]; }
    grid[idx][2] = card;
    if (m) m[idx][2] = null;
  }
  return pushedOut; // null if the spot was empty (edge case)
}

// 推入中央後，詢問玩家是否放下標記（isCentralPush: 推入的行/列方向+idx，用來找新插入格）
async function askPlaceMarker(cp, dir, idx) {
  if (cp.ai) {
    // AI 永遠放標記
    const [r, c] = getInsertedCell(dir, idx);
    G.centralMarkers[r][c] = cp.idx;
    log(`${cp.name} 在中央星陣 (${r+1},${c+1}) 放下標記。`);
    return;
  }
  return new Promise(resolve => {
    openModal({
      title: '中央星陣標記',
      body: () => {
        const wrap = el('div', {});
        wrap.appendChild(el('p', { style: 'color:#e8ecff;margin-bottom:12px' }, '是否在推入的格子放下你的玩家標記？'));
        wrap.appendChild(el('p', { style: 'color:#a8b5e0;font-size:13px' }, '消除時，你的標記每個額外得 +2 分。標記隨牌消失。'));
        return wrap;
      },
      actions: [
        { label: '放下標記', primary: true, onclick: () => {
          const [r, c] = getInsertedCell(dir, idx);
          G.centralMarkers[r][c] = cp.idx;
          log(`${cp.name} 在中央星陣 (${r+1},${c+1}) 放下標記。`);
          closeModal(); resolve();
        }},
        { label: '不放', onclick: () => { closeModal(); resolve(); } }
      ]
    });
  });
}

function getInsertedCell(dir, idx) {
  if (dir === 'down') return [0, idx];
  if (dir === 'up') return [2, idx];
  if (dir === 'right') return [idx, 0];
  if (dir === 'left') return [idx, 2];
}


// ========== 6. 遊戲狀態 ==========
let G = null;

let UI = { selectedHand: null, awaiting: null };

function openModal(config) {
  UI.modal = config;
  // Render modal immediately without full re-render if game is active
  if (G && G.phase === 'playing') {
    // Remove any existing modals first
    document.querySelectorAll('.modal-bg').forEach(n => n.remove());
    renderModal(config);
  } else {
    render();
  }
}

function closeModal() {
  UI.modal = null;
  document.querySelectorAll('.modal-bg').forEach(n => n.remove());
}

function log(text, type) {
  if (!G) return;
  if (!G.log) G.log = [];
  G.log.push({ text, type: type || '' });
  if (G.log.length > 60) G.log = G.log.slice(-60);
}

function initTurnState() {
  G.turn = { eliminations: 0, eliminationScore: 0, maxElimSingle: 0, pushed: false, swapsUsed: 0, questsCompleted: 0, kaliDouble: false };
  return G.turn;
}

function effectiveHandLimit(p) { return 6 + (p.character === 'siel' ? 3 : 0); }
function effectiveQuestLimit(p) { return 3 + (p.character === 'siel' ? 3 : 0); }

function startGame(config) {
  const playerColors = ['#5ec5ff', '#ff8a6a', '#b58aff', '#4dd4ac'];
  const players = config.players.map((p, i) => ({
    idx: i, name: p.name, ai: p.ai, color: playerColors[i],
    score: 0, hand: [], quests: [], completedQuests: 0,
    personalGrid: null, character: null,
    characterActiveUsed: false, eoPassiveUsedThisTurn: false,
  }));
  const deck = shuffle(buildDeck());
  G = {
    config, players,
    centralGrid: makeEmptyGrid(),
    centralMarkers: [[null,null,null],[null,null,null],[null,null,null]],
    deck, discard: [], reserve: [],
    currentPlayer: 0, log: [],
    turn: null, phase: 'setup',
    winnerIdx: null, setupPickIdx: 0, gameEndTriggered: false,
    currentSetupCards: null, // 連線模式：儲存當前玩家的開局 5 張牌（由 host 抽牌後寫入 Firebase）
    firstPlayer: 0, // 首家標記：當前輪的起始玩家
    voidWalker: !!config.voidWalker,
    round: 1, turnCount: 0,
  };
  // Fill personal grids
  for (const p of G.players) {
    p.personalGrid = makeEmptyGrid();
    fillGrid(p.personalGrid);
  }
  // Fill central grid
  fillGrid(G.centralGrid);
  refillReserve();

  if (G.voidWalker) {
    G.phase = 'character-pick';
    beginCharacterPick();
  } else {
    G.phase = 'setup-pick';
    beginSetupPick();
  }
}

// ========== 7. 角色選擇 ==========
function beginCharacterPick() {
  G.characterPickIdx = 0;
  G.takenChars = new Set();
  if (!isOnlineMode()) nextCharacterPick();
  // 連線模式：不在此處直接開 modal，由 Firebase listener 的 onlineHandleCharacterPickPhase() 驅動
}

function nextCharacterPick() {
  if (G.characterPickIdx >= G.players.length) {
    if (isOnlineMode()) return; // 連線模式：由 onlineHandleCharacterPickPhase 處理階段過渡
    G.phase = 'setup-pick';
    beginSetupPick();
    return;
  }
  const p = G.players[G.characterPickIdx];
  const available = Object.values(CHARACTERS).filter(c => !G.takenChars.has(c.id));
  if (p.ai) {
    const pick = available[Math.floor(Math.random() * available.length)];
    p.character = pick.id;
    G.takenChars.add(pick.id);
    log(`${p.name} 選擇了 ${pick.name}（${ENERGY_BY[pick.energy].en}）。`, 'system');
    G.characterPickIdx++;
    if (isOnlineMode() && myPlayerIdx === 0) {
      pushState(); // Host 推送 AI 選角後的狀態，Firebase listener 驅動後續
    } else if (!isOnlineMode()) {
      setTimeout(nextCharacterPick, 300);
    }
  } else {
    // 連線模式：只有本地玩家才開 modal，非本地玩家等待 Firebase 更新
    if (isOnlineMode() && p.idx !== myPlayerIdx) {
      render(); // 顯示等待畫面
      return;
    }
    openModal({
      title: `${p.name}：選擇你的 Void Walker`,
      body: () => {
        const wrap = el('div', {});
        available.forEach(c => {
          const e = ENERGY_BY[c.energy];
          wrap.appendChild(el('div', { class: 'choice-card', style: `border-left: 4px solid ${e.color};`,
            onclick: () => {
              p.character = c.id;
              G.takenChars.add(c.id);
              log(`${p.name} 選擇了 ${c.name}（${e.en}）。`, 'system');
              closeModal();
              G.characterPickIdx++;
              if (isOnlineMode()) {
                pushState(); // 推送後由 Firebase listener 驅動後續玩家選角
              } else {
                nextCharacterPick();
              }
            }
          },
            el('div', { class: 'ctitle' }, `${c.name} · ${c.en}`),
            el('div', { class: 'cdesc' },
              el('div', {}, `${e.en} · ${c.role}`),
              el('div', { style: 'font-style:italic;color:#94a4d3;margin:4px 0;' }, c.flavor),
              el('div', {}, `▸ 被動：${c.passiveDesc}`),
              el('div', {}, `▸ 主動「${c.activeName}」：${c.activeDesc}`),
            )
          ));
        });
        return wrap;
      },
      actions: []
    });
  }
}

// ========== 8. 開局 5 選 3 ==========
function beginSetupPick() {
  G.setupPickIdx = 0;
  if (!isOnlineMode()) { nextSetupPick(); return; }
  // 連線模式：Host 預先抽第一位玩家的牌並存入 state，由 Firebase listener 驅動彈窗
  // (hostStartGame 在 startGame 後負責 pushState，此處只需確保 currentSetupCards 準備好)
  const firstP = G.players[0];
  if (!firstP.ai) G.currentSetupCards = drawN(G, 5);
  // 推送動作在 hostStartGame 完成
}

function nextSetupPick() {
  if (G.setupPickIdx >= G.players.length) {
    G.phase = 'playing';
    log(`系統：遊戲開始！由 ${G.players[G.currentPlayer].name} 先手。`, 'system');
    if (isOnlineMode()) pushState(); // 連線模式：開局設置完成後推送初始狀態給所有玩家
    render();
    setTimeout(maybeRunAITurn, 600);
    return;
  }
  const p = G.players[G.setupPickIdx];
  const five = drawN(G, 5);
  if (p.ai) {
    const sorted = [...five].sort((a, b) => SHAPE_BY[b.shape].stars - SHAPE_BY[a.shape].stars);
    p.hand = [sorted[1], sorted[2], sorted[3]];
    p.quests = [{ energy: sorted[0].energy, card: sorted[0] }];
    G.discard.push(sorted[4]);
    log(`${p.name} 完成開局抽牌。`, 'system');
    G.setupPickIdx++;
    setTimeout(nextSetupPick, 400);
  } else {
    openSetupPickModal(p, five);
  }
}

function openSetupPickModal(p, five) {
  const state = { hand: [], quest: null, discard: null };
  const update = () => {
    document.querySelectorAll('.modal-bg').forEach(n => n.remove());
    openModal({
      title: `${p.name}：開局抽 5 選 3`,
      body: () => buildSetupPickBody(p, five, state, update),
      actions: []
    });
  };
  update();
}

function buildSetupPickBody(p, five, state, update) {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { class: 'muted small' }, '點 3 張手牌、1 張任務、1 張棄牌'));
  wrap.appendChild(el('p', { class: 'small' }, `手牌 ${state.hand.length}/3，任務 ${state.quest != null ? 1 : 0}/1，棄牌 ${state.discard != null ? 1 : 0}/1`));
  const grid = el('div', { class: 'pick-grid' });
  five.forEach((card, idx) => {
    const role = state.hand.includes(idx) ? 'hand' : state.quest === idx ? 'quest' : state.discard === idx ? 'discard' : null;
    const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
    const div = el('div', {
      class: 'hand-card pick-card' + (role ? ' picked' : ''),
      style: `--cc: ${e.color};`,
      title: `${e.name} · ${s.name}`,
      onclick: () => {
        if (role == null) {
          if (state.hand.length < 3) state.hand.push(idx);
          else if (state.quest == null) state.quest = idx;
          else if (state.discard == null) state.discard = idx;
        } else if (role === 'hand') { state.hand = state.hand.filter(x => x !== idx); if (state.quest == null) state.quest = idx; else if (state.discard == null) state.discard = idx; }
        else if (role === 'quest') { state.quest = null; if (state.discard == null) state.discard = idx; }
        else { state.discard = null; }
        update();
      }
    });
    div.innerHTML = `<div class="icon">${shapeSVG(card.shape, e.color, 40)}</div>
                     <div class="label">${e.en.toUpperCase()}</div>
                     <div class="shape-label">${s.name}</div>
                     <div class="stars">${'★'.repeat(s.stars)}</div>`;
    if (role) {
      const tag = el('div', { style: 'position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:10px;color:#ffd6a8;' },
        role === 'hand' ? '手牌' : role === 'quest' ? '任務' : '棄牌');
      div.appendChild(tag);
      div.style.marginBottom = '20px';
    }
    grid.appendChild(div);
  });
  wrap.appendChild(grid);
  const ready = state.hand.length === 3 && state.quest != null && state.discard != null;
  wrap.appendChild(el('div', { class: 'modal-actions' },
    el('button', {
      class: ready ? '' : 'secondary',
      style: ready ? '' : 'opacity:0.4;pointer-events:none;',
      onclick: () => {
        p.hand = state.hand.map(i => five[i]);
        p.quests = [{ energy: five[state.quest].energy, card: five[state.quest] }];
        G.discard.push(five[state.discard]);
        log(`${p.name} 完成開局抽牌。`, 'system');
        G.setupPickIdx++;
        if (isOnlineMode()) {
          G.currentSetupCards = null;
          // 若是 host，為下一位非 AI 玩家預先抽牌
          if (myPlayerIdx === 0 && G.setupPickIdx < G.players.length) {
            const nextP = G.players[G.setupPickIdx];
            if (!nextP.ai) G.currentSetupCards = drawN(G, 5);
          }
          closeModal();
          pushState(); // Firebase listener 驅動後續流程
        } else {
          closeModal();
          nextSetupPick();
        }
      }
    }, '確認')
  ));
  return wrap;
}

// ========== 9. 回合流程 ==========
async function endTurn() {
  const cp = G.players[G.currentPlayer];
  // 結束回合後從預備區選 1 張
  await pickFromReserve(cp);
  refillReserve();
  // 手牌超限則丟牌
  const lim = effectiveHandLimit(cp);
  if (cp.hand.length > lim) {
    if (cp.ai) {
      while (cp.hand.length > lim) G.discard.push(cp.hand.pop());
    } else {
      await forceDiscardToLimit(cp, lim);
    }
  }
  // 切換玩家
  G.turn = null;
  G.awaitingEndTurn = false;
  UI.selectedHand = null;
  cp.eoPassiveUsedThisTurn = false;
  G.currentPlayer = (G.currentPlayer + 1) % G.players.length;
  if (G.currentPlayer === 0) {
    // 本輪結束：檢查勝利條件
    if (G.gameEndTriggered) {
      const sorted = [...G.players].sort((a, b) => b.score - a.score || b.completedQuests - a.completedQuests);
      G.winnerIdx = sorted[0].idx;
      G.phase = 'game-over';
      render();
      return;
    }
    G.round++;
  }
  G.turnCount++;
  log(`— ${G.players[G.currentPlayer].name} 的回合開始。`, 'system');
  render();
  setTimeout(maybeRunAITurn, 500);
}

async function pickFromReserve(cp) {
  if (!G.reserve || G.reserve.length === 0) return;
  if (cp.ai) {
    const picked = G.reserve.shift();
    if (cp.hand.length < effectiveHandLimit(cp)) cp.hand.push(picked);
    else G.discard.push(picked);
    return;
  }
  return new Promise(resolve => {
    openModal({
      title: '回合結束：從預備區選 1 張加入手牌',
      body: () => {
        const wrap = el('div', { class: 'pick-grid' });
        G.reserve.forEach((card, i) => {
          const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
          const div = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
            onclick: () => {
              const taken = G.reserve.splice(i, 1)[0];
              if (cp.hand.length < effectiveHandLimit(cp)) cp.hand.push(taken);
              else G.discard.push(taken);
              closeModal(); resolve();
            }
          });
          div.innerHTML = `<div class="icon">${shapeSVG(card.shape, e.color, 40)}</div>
                           <div class="label">${e.en.toUpperCase()}</div>
                           <div class="shape-label">${s.name}</div>
                           <div class="stars">${'★'.repeat(s.stars)}</div>`;
          wrap.appendChild(div);
        });
        return wrap;
      },
      actions: []
    });
  });
}

async function forceDiscardToLimit(cp, lim) {
  return new Promise(resolve => {
    const update = () => {
      document.querySelectorAll('.modal-bg').forEach(n => n.remove());
      if (cp.hand.length <= lim) { resolve(); return; }
      openModal({
        title: `手牌超限，請棄 ${cp.hand.length - lim} 張`,
        body: () => {
          const wrap = el('div', { class: 'pick-grid' });
          cp.hand.forEach((card, i) => {
            const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
            const div = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
              onclick: () => {
                G.discard.push(cp.hand.splice(i, 1)[0]);
                update();
              }
            });
            div.innerHTML = `<div class="icon">${shapeSVG(card.shape, e.color, 40)}</div>
                             <div class="label">${e.en.toUpperCase()}</div>
                             <div class="shape-label">${s.name}</div>`;
            wrap.appendChild(div);
          });
          return wrap;
        },
        actions: []
      });
    };
    update();
  });
}


// ========== 10. 消除結算 ==========
async function resolveCascades(grid, cp) {
  if (!G.turn) initTurnState();
  const matches = findMatchesInGrid(grid);
  if (matches.length === 0) return;

  // 動畫標記
  matches.forEach(m => {
    m.cells.forEach(([r, c]) => {
      const div = findGridCellDiv(grid, r, c);
      if (div) div.classList.add('matched');
    });
  });
  await delay(600);

  let turnScore = 0;
  for (const m of matches) {
    let score = m.score;
    if (G.turn.kaliDouble) score *= 2;
    const extra = score > m.score ? ` ×2` : '';
    log(`✨ ${m.name}（${ENERGY_BY[m.energy].name}）+${score}${extra}`, 'score');
    G.turn.eliminations++;
    G.turn.eliminationScore += score;
    if (m.size > G.turn.maxElimSingle) G.turn.maxElimSingle = m.size;
    turnScore += score;
    // 移除消除的格子
    m.cells.forEach(([r, c]) => { G.discard.push(grid[r][c]); grid[r][c] = null; });
    // 中央星陣標記加分
    if (grid === G.centralGrid) {
      const markerBonus = {};
      m.cells.forEach(([r, c]) => {
        const ownerIdx = G.centralMarkers[r][c];
        if (ownerIdx !== null && ownerIdx !== undefined) {
          markerBonus[ownerIdx] = (markerBonus[ownerIdx] || 0) + 2;
          G.centralMarkers[r][c] = null;
        }
      });
      for (const [pidx, bonus] of Object.entries(markerBonus)) {
        G.players[pidx].score += bonus;
        log(`🏴 ${G.players[pidx].name} 標記加分 +${bonus}`, 'score');
      }
    }
    // 卡莉被動：消除超過3個時，從棄牌堆取任意1張（格子已清除後再選）
    if (m.size > 3 && cp.character === 'kali' && cp.hand.length < effectiveHandLimit(cp)) {
      if (G.discard.length > 0 && !cp.ai) {
        await new Promise(resolve => {
          openModal({
            title: '✨ 卡莉被動：從棄牌堆取任意 1 張加入手牌',
            body: () => {
              const wrap = el('div', { class: 'pick-grid' });
              [...G.discard].reverse().forEach((card) => {
                const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
                const div = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
                  onclick: () => {
                    const idx2 = G.discard.indexOf(card);
                    if (idx2 >= 0) cp.hand.push(G.discard.splice(idx2, 1)[0]);
                    log(`✨ 卡莉被動：從棄牌堆取回 1 張牌。`, 'system');
                    closeModal(); resolve();
                  }
                });
                div.innerHTML = `<div class="icon">${shapeSVG(card.shape, e.color, 40)}</div><div class="label">${e.en.toUpperCase()}</div><div class="shape-label">${s.name}</div>`;
                wrap.appendChild(div);
              });
              return wrap;
            },
            actions: [{ label: '跳過', onclick: () => { closeModal(); resolve(); } }]
          });
        });
      } else if (cp.ai && G.discard.length > 0) {
        cp.hand.push(G.discard.splice(G.discard.length - 1, 1)[0]);
        log(`✨ 卡莉被動：從棄牌堆取回 1 張牌。`, 'system');
      }
    }
  }
  cp.score += turnScore;
  render();
  await delay(300);

  // 補牌（由上往下、由左往右；補入後立即觸發消除則丟棄繼續補）
  const useEoGuide = G.turn && G.turn.eoGuide && cp.character === 'eo' && G.reserve && G.reserve.length > 0;
  if (useEoGuide) { G.turn.eoGuide = false; } // 消耗一次

  if (useEoGuide && !cp.ai) {
    // 艾歐引導：玩家從預備區選牌補入每個空格
    const emptyCells = [];
    for (let r = 0; r < 3; r++) for (let c = 0; c < 3; c++) if (grid[r][c] === null) emptyCells.push([r, c]);
    for (const [r, c] of emptyCells) {
      if (G.reserve.length === 0) {
        // 預備區已空，改從牌庫補
        const d = drawN(G, 1);
        if (d.length) grid[r][c] = d[0];
        continue;
      }
      await new Promise(resolve => {
        openModal({
          title: `艾歐引導：選擇補入 (${r+1},${c+1}) 的牌`,
          body: () => {
            const wrap = el('div', { class: 'pick-grid' });
            G.reserve.forEach((card, i) => {
              const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
              const div = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
                onclick: async () => {
                  grid[r][c] = G.reserve.splice(i, 1)[0];
                  closeModal();
                  refillReserve();
                  resolve();
                }
              });
              div.innerHTML = `<div class="icon">${shapeSVG(card.shape, e.color, 40)}</div><div class="label">${e.en.toUpperCase()}</div><div class="shape-label">${s.name}</div>`;
              wrap.appendChild(div);
            });
            return wrap;
          },
          actions: []
        });
      });
    }
    render();
    // 艾歐引導可觸發連鎖消除
    await resolveCascades(grid, cp);
  } else {
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        if (grid[r][c] !== null) continue;
        let tries = 0;
        while (tries < 30) {
          tries++;
          const d = drawN(G, 1);
          if (!d.length) break;
          grid[r][c] = d[0];
          if (findMatchesInGrid(grid).length > 0) {
            G.discard.push(grid[r][c]);
            grid[r][c] = null;
            log(`系統：補入的牌立即觸發消除，丟棄重補。`, 'system');
          } else {
            break;
          }
        }
      }
    }
    render();
  }
  if (cp.score >= 66 && !G.gameEndTriggered) {
    G.gameEndTriggered = true;
    log(`🌟 ${cp.name} 已達到 66 分！完成本輪後結算勝負。`, 'system');
  }
}

function findGridCellDiv(grid, r, c) {
  // grids are rendered with data-grid-id attribute
  const gridId = grid === G.centralGrid ? 'central' : `personal-${G.currentPlayer}`;
  const gridEl = document.querySelector(`[data-grid-id="${gridId}"]`);
  if (!gridEl) return null;
  // 5×5 wrapper: inner cells at positions (r+1)*5+(c+1)
  const idx = (r + 1) * 5 + (c + 1);
  const cell = gridEl.children[idx];
  if (!cell) return null;
  // cell IS the star-card div directly
  return cell.classList.contains('star-card') ? cell : cell.querySelector('.star-card');
}

// ========== 11. 被推出的牌 ==========
async function handlePushedOut(card, cp, sourceGrid) {
  if (!card) return; // 空位吸收，沒有牌推出
  log(`${cardLabel(card)} 被推出星陣。`);
  if (cp.ai) {
    const hLim = effectiveHandLimit(cp), qLim = effectiveQuestLimit(cp);
    // AI 決策：優先手牌，其次任務
    if (cp.hand.length < hLim) {
      cp.hand.push(card);
      log(`${cp.name} 將 ${cardLabel(card)} 收入手牌。`);
    } else if (cp.quests.length < qLim) {
      cp.quests.push({ energy: card.energy, card });
      log(`${cp.name} 將 ${cardLabel(card)} 設為任務。`);
    } else {
      // 使用星際能力
      G.discard.push(card);
      await aiUseAbility(cp, card, sourceGrid);
    }
    render();
    return;
  }
  return new Promise(resolve => {
    const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
    const hLim = effectiveHandLimit(cp), qLim = effectiveQuestLimit(cp);
    openModal({
      title: `${s.name} · ${e.name} 被推出`,
      body: () => {
        const wrap = el('div', {});
        const canHand = cp.hand.length < hLim;
        const canQuest = cp.quests.length < qLim;

        // 收入手牌
        const handDiv = el('div', { class: 'choice-card' + (canHand ? '' : ' disabled') },
          el('div', { class: 'ctitle' }, `收入手牌 ${canHand ? '' : `（上限 ${hLim}）`}`),
          el('div', { class: 'cdesc' }, `目前手牌：${cp.hand.length}/${hLim}`));
        handDiv.addEventListener('click', async () => {
          if (!canHand) return;
          cp.hand.push(card);
          log(`${cp.name} 將 ${cardLabel(card)} 收入手牌。`);
          closeModal(); render();
          // 塔薇被動
          if (cp.character === 'tavi' && cp.quests.length < effectiveQuestLimit(cp) && cp.hand.length > 0) {
            await taviPassivePlaceQuest(cp);
          }
          resolve();
        });
        wrap.appendChild(handDiv);

        // 發動星際能力
        const abilityDiv = el('div', { class: 'choice-card' },
          el('div', { class: 'ctitle' }, `發動星際能力（${s.name}）`),
          el('div', { class: 'cdesc' }, ABILITY_DESCS[card.shape]));
        abilityDiv.addEventListener('click', async () => {
          G.discard.push(card);
          closeModal();
          await useAbility(cp, card, sourceGrid);
          render(); resolve();
        });
        wrap.appendChild(abilityDiv);

        // 設為觀測任務
        const questDiv = el('div', { class: 'choice-card' + (canQuest ? '' : ' disabled') },
          el('div', { class: 'ctitle' }, `設為觀測任務 ${canQuest ? '' : `（上限 ${qLim}）`}`),
          el('div', { class: 'cdesc' }, `${e.name}任務：${QUESTS[card.energy].desc}（完成 +${QUESTS[card.energy].score} 分）`));
        questDiv.addEventListener('click', () => {
          if (!canQuest) return;
          cp.quests.push({ energy: card.energy, card });
          log(`${cp.name} 將 ${cardLabel(card)} 設為任務。`);
          closeModal(); render(); resolve();
        });
        wrap.appendChild(questDiv);

        return wrap;
      },
      actions: []
    });
  });
}

// ========== 12. 星際能力 ==========
async function useAbility(cp, card, sourceGrid) {
  log(`${cp.name} 發動星際能力（${SHAPE_BY[card.shape].name}）：${ABILITY_DESCS[card.shape]}`);
  if (card.shape === 'meteor') await meteorAbility(cp, sourceGrid);
  else if (card.shape === 'comet') await cometAbility(cp, sourceGrid);
  else if (card.shape === 'black') await blackAbility(cp, sourceGrid);
}

async function aiUseAbility(cp, card, sourceGrid) {
  if (card.shape === 'meteor') {
    // AI 隕石：從手牌再推一張（選第0張）
    if (cp.hand.length > 0) {
      const pushed = cp.hand.shift();
      const grid = G.centralGrid; // AI 優先推中央
      const pushedOut = pushIntoGrid3x3(grid, pushed, 'down', 0);
      if (pushedOut && cp.hand.length < effectiveHandLimit(cp)) cp.hand.push(pushedOut);
      await resolveCascades(grid, cp);
    }
  } else if (card.shape === 'comet') {
    // AI 彗星：交換個人星陣第一張 与 手牌第一張
    if (cp.hand.length > 0 && cp.personalGrid) {
      const handCard = cp.hand[0];
      const gridCard = cp.personalGrid[0][0];
      if (gridCard) {
        cp.hand[0] = gridCard;
        cp.personalGrid[0][0] = handCard;
        await resolveCascades(cp.personalGrid, cp);
      }
    }
  } else if (card.shape === 'black') {
    // AI 黑洞：從個人星陣移除一張，補入牌庫牌
    if (cp.personalGrid) {
      for (let r = 0; r < 3; r++) for (let c = 0; c < 3; c++) {
        if (cp.personalGrid[r][c]) {
          G.discard.push(cp.personalGrid[r][c]);
          cp.personalGrid[r][c] = null;
          const drawn = drawN(G, 2);
          if (drawn.length > 0) { cp.personalGrid[r][c] = drawn[0]; if (drawn[1]) cp.hand.push(drawn[1]); }
          await resolveCascades(cp.personalGrid, cp);
          return;
        }
      }
    }
  }
}

async function meteorAbility(cp, sourceGrid) {
  // 從手牌選 1 張推入任一星陣，推出的牌收回手牌
  return new Promise(resolve => {
    if (cp.hand.length === 0) { resolve(); return; }
    openModal({
      title: '隕石能力：選擇要推入的手牌',
      body: () => {
        const wrap = el('div', { class: 'pick-grid' });
        cp.hand.forEach((card, i) => {
          const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
          const div = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
            onclick: () => {
              const meteorCard = cp.hand.splice(i, 1)[0];
              closeModal();
              UI.awaiting = {
                type: 'meteorAbilityPush',
                hint: '選擇推入哪個星陣的哪條邊緣。',
                onPush: async (grid, dir, idx) => {
                  UI.awaiting = null;
                  const pushedOut = pushIntoGrid3x3(grid, meteorCard, dir, idx);
                  if (grid === G.centralGrid) await askPlaceMarker(cp, dir, idx);
                  if (pushedOut && cp.hand.length < effectiveHandLimit(cp)) {
                    cp.hand.push(pushedOut);
                    log(`${cp.name} 使用隕石能力，推出的 ${cardLabel(pushedOut)} 收回手牌。`);
                  }
                  await resolveCascades(grid, cp);
                  render(); resolve();
                }
              };
              render();
            }
          });
          div.innerHTML = `<div class="icon">${shapeSVG(card.shape, e.color, 40)}</div>
                           <div class="label">${e.en.toUpperCase()}</div>
                           <div class="shape-label">${s.name}</div>`;
          wrap.appendChild(div);
        });
        return wrap;
      },
      actions: [{ label: '取消', onclick: () => { UI.awaiting = null; resolve(); } }]
    });
  });
}

async function cometAbility(cp, sourceGrid) {
  // 手牌 1 張與任一星陣 1 張互換
  return new Promise(resolve => {
    if (cp.hand.length === 0) { resolve(); return; }
    let selectedHandIdx = null;
    let selectedGrid = null, selectedR = null, selectedC = null;

    const trySwap = async () => {
      if (selectedHandIdx == null || selectedGrid == null) return;
      const handCard = cp.hand[selectedHandIdx];
      const gridCard = selectedGrid[selectedR][selectedC];
      cp.hand[selectedHandIdx] = gridCard;
      selectedGrid[selectedR][selectedC] = handCard;
      log(`${cp.name} 彗星能力：${cardLabel(handCard)} ↔ ${cardLabel(gridCard)}。`);
      UI.awaiting = null;
      closeModal();
      await resolveCascades(selectedGrid, cp);
      render(); resolve();
    };

    UI.awaiting = {
      type: 'cometAbilityPickGrid',
      hint: '選擇手牌，再點擊星陣中一張牌互換。',
      onPickHand: (idx) => { selectedHandIdx = idx; },
      onPickGrid: async (grid, r, c) => {
        selectedGrid = grid; selectedR = r; selectedC = c;
        await trySwap();
      }
    };
    openModal({
      title: '彗星能力：選擇要互換的手牌',
      body: () => {
        const wrap = el('div', { class: 'pick-grid' });
        cp.hand.forEach((card, i) => {
          const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
          const div = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
            onclick: () => {
              selectedHandIdx = i;
              closeModal();
              UI.awaiting.hint = '再點擊任一星陣中的牌進行互換。';

// ========== 13. 任務結算 ==========
async function completeQuest(cp, idx) {
  const q = cp.quests[idx];
  const Q = QUESTS[q.energy];
  cp.score += Q.score;
  cp.completedQuests++;
  cp.quests.splice(idx, 1);
  if (G.turn) G.turn.questsCompleted = (G.turn.questsCompleted || 0) + 1;
  log(`🎯 ${cp.name} 完成「${ENERGY_BY[q.energy].name}」任務 +${Q.score} 分！`, 'score');
  // 露娜被動：可扣 5 分從預備區放置 1 張牌作為任務
  if (cp.character === 'luna') {
    const canAfford = cp.score >= 5;
    const hasReserve = G.reserve && G.reserve.length > 0;
    const hasQuestSlot = cp.quests.length < effectiveQuestLimit(cp);
    if (!cp.ai && canAfford && hasReserve && hasQuestSlot) {
      await new Promise(resolve => {
        openModal({
          title: '露娜被動：是否扣 5 分從預備區放置任務？',
          body: () => {
            const wrap = el('div', { style: 'text-align:center' });
            wrap.innerHTML = `<p>當前分數：<b>${cp.score}</b>（扣 5 後剩 ${cp.score - 5}）</p>
              <p style="font-size:0.9em;color:var(--col-muted)">從預備區選 1 張牌加入觀測任務</p>`;
            return wrap;
          },
          actions: [
            { label: '放棄', onclick: () => { closeModal(); resolve(); } },
            { label: '確認 −5 分', onclick: () => {
              closeModal();
              // 選預備區牌
              openModal({
                title: '選擇 1 張預備區牌作為任務',
                body: () => {
                  const wrap = el('div', { class: 'pick-grid' });
                  G.reserve.forEach((c, i) => {
                    const e = ENERGY_BY[c.energy], s = SHAPE_BY[c.shape];
                    const div = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
                      onclick: () => {
                        cp.score -= 5;
                        const chosen = G.reserve.splice(i, 1)[0];
                        cp.quests.push({ energy: chosen.energy, card: chosen });
                        log(`✨ 露娜被動：扣 5 分，放置「${ENERGY_BY[chosen.energy].name}」為任務。`, 'system');
                        closeModal(); render(); resolve();
                      }
                    });
                    div.innerHTML = `<div class="icon">${shapeSVG(c.shape, e.color, 40)}</div><div class="label">${e.en.toUpperCase()}</div><div class="shape-label">${s.name}</div>`;
                    wrap.appendChild(div);
                  });
                  return wrap;
                },
                actions: [{ label: '取消', onclick: () => { closeModal(); resolve(); } }]
              });
            }}
          ]
        });
      });
    }
    // 正常抽 1 張
    const drawn = drawN(G, 1);
    if (drawn.length) { cp.hand.push(drawn[0]); log(`${cp.name} 抽 1 張牌（任務獎勵）。`); }
  } else {
    const drawn = drawN(G, 1);
    if (drawn.length) { cp.hand.push(drawn[0]); log(`${cp.name} 抽 1 張牌（任務獎勵）。`); }
  }
  if (cp.score >= 66 && !G.gameEndTriggered) {
    G.gameEndTriggered = true;
    log(`🌟 ${cp.name} 已達到 66 分！完成本輪後結算勝負。`, 'system');
  }
  render();
}

// ========== 14. 棄牌換牌 ==========
async function beginSwapHand() {
  const cp = G.players[G.currentPlayer];
  if (!G.turn) initTurnState();
  if (G.turn.swapsUsed > 0) return; // 每回合只能棄牌換牌 1 次
  if (cp.hand.length === 0) return;
  const isRyk = cp.character === 'ryk';
  const isSiel = cp.character === 'siel';

  if (isRyk) {
    // 瑞克被動：棄 2 張，從預備區與牌庫頂自由分配取 2 張
    if (cp.hand.length < 2) return;
    const toDiscard = [];
    await new Promise(resolve => {
      const selectStep = () => {
        openModal({
          title: `瑞克被動：棄牌換牌（已選 ${toDiscard.length}/2 張棄牌）`,
          body: () => {
            const wrap = el('div', { class: 'pick-grid' });
            cp.hand.forEach((card, i) => {
              if (toDiscard.includes(i)) return; // 已選
              const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
              const div = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
                onclick: () => {
                  toDiscard.push(i);
                  closeModal();
                  if (toDiscard.length < 2) selectStep();
                  else resolve();
                }
              });
              div.innerHTML = `<div class="icon">${shapeSVG(card.shape, e.color, 40)}</div><div class="label">${e.en.toUpperCase()}</div><div class="shape-label">${s.name}</div>`;
              wrap.appendChild(div);
            });
            return wrap;
          },
          actions: [{ label: '取消', onclick: () => { toDiscard.length = 0; closeModal(); resolve(); } }]
        });
      };
      selectStep();
    });
    if (toDiscard.length < 2) return;
    // 棄牌（從後往前移除避免 index 問題）
    toDiscard.sort((a, b) => b - a);
    toDiscard.forEach(i => G.discard.push(cp.hand.splice(i, 1)[0]));
    // 取 2 張：自由從預備區或牌庫頂選
    for (let pick = 0; pick < 2; pick++) {
      await new Promise(resolve => {
        const opts = [];
        if (G.reserve && G.reserve.length > 0) opts.push('reserve');
        if (G.deck && G.deck.length > 0) opts.push('deck');
        if (opts.length === 0) { resolve(); return; }
        if (opts.length === 1 && opts[0] === 'deck') {
          const d = drawN(G, 1); if (d.length) cp.hand.push(d[0]);
          log(`${cp.name} 從牌庫取 1 張。`); resolve(); return;
        }
        openModal({
          title: `瑞克被動：選取第 ${pick + 1} 張（共 2 張）`,
          body: () => {
            const wrap = el('div', { style: 'display:flex;gap:12px;flex-wrap:wrap' });
            if (G.reserve && G.reserve.length > 0) {
              const rBtn = el('button', { style: 'flex:1;padding:10px;cursor:pointer', onclick: () => {
                closeModal();
                // 讓玩家選預備區
                openModal({
                  title: '選擇預備區牌',
                  body: () => {
                    const w = el('div', { class: 'pick-grid' });
                    G.reserve.forEach((c, ri) => {
                      const e = ENERGY_BY[c.energy], s = SHAPE_BY[c.shape];
                      const d = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
                        onclick: () => { cp.hand.push(G.reserve.splice(ri, 1)[0]); closeModal(); resolve(); }
                      });
                      d.innerHTML = `<div class="icon">${shapeSVG(c.shape, e.color, 40)}</div><div class="label">${e.en.toUpperCase()}</div><div class="shape-label">${s.name}</div>`;
                      w.appendChild(d);
                    });
                    return w;
                  },
                  actions: []
                });
              }});
              rBtn.textContent = '從預備區取';
              wrap.appendChild(rBtn);
            }
            if (G.deck && G.deck.length > 0) {
              const dBtn = el('button', { style: 'flex:1;padding:10px;cursor:pointer', onclick: () => {
                closeModal();
                const d = drawN(G, 1); if (d.length) cp.hand.push(d[0]);
                log(`${cp.name} 從牌庫取 1 張。`); resolve();
              }});
              dBtn.textContent = '從牌庫頂取';
              wrap.appendChild(dBtn);
            }
            return wrap;
          },
          actions: []
        });
      });
    }
    G.turn.swapsUsed++;
    refillReserve();
    render();
    return;
  }

  // 普通棄牌換牌（含 Siel 可從棄牌堆頂取牌）
  return new Promise(resolve => {
    openModal({
      title: '棄牌換牌：選擇要棄掉的手牌',
      body: () => {
        const wrap = el('div', { class: 'pick-grid' });
        cp.hand.forEach((card, i) => {
          const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
          const div = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
            onclick: async () => {
              closeModal();
              G.discard.push(cp.hand.splice(i, 1)[0]);
              // 席爾被動：棄牌換牌時可從預備區或棄牌堆頂取牌
              if (isSiel) {
                const hasDiscard = G.discard.length > 0;
                const hasReserve = G.reserve && G.reserve.length > 0;
                if (hasDiscard && hasReserve) {
                  await pickFromReserveOrDiscardSwap(cp);
                } else if (hasDiscard) {
                  // 只有棄牌堆可選
                  const card = G.discard.splice(G.discard.length - 1, 1)[0];
                  cp.hand.push(card);
                  log(`✨ 席爾被動：從棄牌堆頂取回 ${ENERGY_BY[card.energy].name} 牌。`, 'system');
                } else if (hasReserve) {
                  await pickFromReserveSwap(cp);
                }
              } else {
                await pickFromReserveSwap(cp);
              }
              G.turn.swapsUsed++;
              refillReserve();
              render(); resolve();
            }
          });
          div.innerHTML = `<div class="icon">${shapeSVG(card.shape, e.color, 40)}</div><div class="label">${e.en.toUpperCase()}</div><div class="shape-label">${s.name}</div>`;
          wrap.appendChild(div);
        });
        return wrap;
      },
      actions: [{ label: '取消', onclick: () => resolve() }]
    });
  });
}

async function pickFromReserveSwap(cp) {
  if (!G.reserve || G.reserve.length === 0) return;
  return new Promise(resolve => {
    openModal({
      title: '選擇從預備區換入的牌',
      body: () => {
        const wrap = el('div', { class: 'pick-grid' });
        G.reserve.forEach((card, i) => {
          const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];

              closeModal(); resolve();
            }
          });
          div.innerHTML = `<div class="icon">${shapeSVG(card.shape, e.color, 40)}</div><div class="label">${e.en.toUpperCase()}</div><div class="shape-label">${s.name}</div>`;
          wrap.appendChild(div);
        });
        return wrap;
      },
      actions: []
    });
  });
}

async function pickFromReserveOrDiscardSwap(cp) {
  // 席爾被動：棄牌換牌時可從棄牌堆頂取牌
  return new Promise(resolve => {
    const discardTop = G.discard.length > 0 ? G.discard[G.discard.length - 1] : null;
    openModal({
      title: '席爾被動：選擇換入來源',
      body: () => {
        const wrap = el('div', { style: 'display:flex;gap:12px;flex-wrap:wrap' });
        if (G.reserve && G.reserve.length > 0) {
          const rBtn = el('button', { style: 'flex:1;padding:10px;cursor:pointer', onclick: () => {
            closeModal(); pickFromReserveSwap(cp).then(resolve);
          }});
          rBtn.textContent = '從預備區取';
          wrap.appendChild(rBtn);
        }
        if (discardTop) {
          const e = ENERGY_BY[discardTop.energy];
          const dBtn = el('button', { style: `flex:1;padding:10px;cursor:pointer;border:2px solid ${e.color}`, onclick: () => {
            cp.hand.push(G.discard.splice(G.discard.length - 1, 1)[0]);
            log(`✨ 席爾被動：從棄牌堆頂取回 ${e.name} 牌。`, 'system');
            closeModal(); resolve();
          }});
          dBtn.innerHTML = `從棄牌堆頂取<br><small style="color:${e.color}">${e.en.toUpperCase()}</small>`;
          wrap.appendChild(dBtn);
        }
        return wrap;
      },
      actions: []
    });
  });
}

// ========== 15. 星塵凝聚 ==========
function canDeclareStardust(cp) {
  if (!G || G.phase !== 'playing') return false;
  if (cp !== G.players[G.currentPlayer] || cp.ai) return false;
  if (cp.hand.length >= 3) return false;
  if (cp.hand.length === 0) return true; // 強制
  if (G.awaitingEndTurn) return false;
  if (G.turn) {
    if (G.turn.swapsUsed > 0) return false;
    if (G.turn.pushed) return false;
    if ((G.turn.questsCompleted || 0) > 0) return false;
  }
  if (cp.characterActiveUsed) return false;
  if (cp.eoPassiveUsedThisTurn) return false;
  return true;
}

async function doStardust(cp) {
  const forced = cp.hand.length === 0;
  log(`💫 ${cp.name} 宣告「星塵凝聚」${forced ? '（強制）' : ''}，跳過本回合，補牌至 5 張。`, 'system');
  while (cp.hand.length < 5) {
    const d = drawN(G, 1);
    if (!d.length) break;
    cp.hand.push(d[0]);
  }
  if (!G.turn) initTurnState();
  await endTurn();
}

// ========== 16. 互動：推牌 ==========
function canPushNow() {
  if (!G || G.phase !== 'playing') return false;
  const cp = G.players[G.currentPlayer];
  if (cp.ai || UI.awaiting) return false;
  if (UI.selectedHand == null && !(UI.awaiting && UI.awaiting.type === 'meteorAbilityPush')) return false;
  if (G.turn && G.turn.pushed) return false;
  return true;
}

function canDoSwap() {
  if (!G || G.phase !== 'playing') return false;
  const cp = G.players[G.currentPlayer];
  if (cp.ai || UI.awaiting || UI.selectedHand != null) return false;
  if (!G.turn) return true;
  if ((G.turn.swapsUsed || 0) >= 1) return false; // 每回合只能棄牌換牌 1 次
  if (cp.character === 'ryk') {
    // 瑞克棄 2 換 2：需手牌 ≥ 2 且預備區或牌庫有牌
    return cp.hand.length >= 2 && ((G.reserve && G.reserve.length > 0) || G.deck.length > 0);
  }
  return cp.hand.length > 0 && G.reserve && G.reserve.length > 0;
}

function onHandCardClick(idx) {
  if (G.phase !== 'playing') return;
  const cp = G.players[G.currentPlayer];
  if (cp.ai) return;
  if (UI.awaiting) {
    if (UI.awaiting.type === 'cometAbilityPickGrid' && UI.awaiting.onPickHand) {
      UI.awaiting.onPickHand(idx);
      UI.awaiting.hint = '再點擊任一星陣中的牌進行互換。';
      render();
    }
    return;
  }
  if (!G.turn) initTurnState();
  UI.selectedHand = UI.selectedHand === idx ? null : idx;
  render();
}

async function onPushClick(grid, dir, idx) {
  if (UI.awaiting && UI.awaiting.type === 'meteorAbilityPush') {
    await UI.awaiting.onPush(grid, dir, idx);
    return;
  }
  if (!canPushNow()) return;
  const cp = G.players[G.currentPlayer];
  const card = cp.hand.splice(UI.selectedHand, 1)[0];
  UI.selectedHand = null;
  if (!G.turn) initTurnState();
  G.turn.pushed = true;
  const gridName = grid === G.centralGrid ? '中央星陣' : '個人星陣';
  log(`${cp.name} 將 ${cardLabel(card)} 推入${gridName}（${dirName(dir)} 第 ${idx + 1} ${dir === 'down' || dir === 'up' ? '列' : '行'}）。`);
  const pushedOut = pushIntoGrid3x3(grid, card, dir, idx);
  // 推入中央星陣後詢問是否放標記
  if (grid === G.centralGrid) {
    render();
    await askPlaceMarker(cp, dir, idx);
  }
  render();
  await delay(200);
  await handlePushedOut(pushedOut, cp, grid);
  await resolveCascades(grid, cp);
  if (G.phase === 'game-over') return;
  G.awaitingEndTurn = true;
  UI.selectedHand = null;
  log(`${cp.name}：可結算任務後按「結束回合」。`, 'system');
  render();
}

function dirName(d) {
  return { down: '上方', up: '下方', right: '左方', left: '右方' }[d];
}

// ========== 17. 角色主動能力 ==========
async function triggerCharacterActive(p) {
  if (!p.character || p.characterActiveUsed) return;
  const ch = CHARACTERS[p.character];
  const ok = await new Promise(r => {
    openModal({
      title: `發動「${ch.activeName}」？`,
      bodyHtml: `<p>${ch.activeDesc}</p><p class="small muted">每局限用一次。</p>`,
      actions: [
        { label: '取消', onclick: () => r(false) },
        { label: '發動', primary: true, onclick: () => r(true) }
      ]
    });
  });
  if (!ok) return;
  p.characterActiveUsed = true;
  if (!G.turn) initTurnState();

  if (p.character === 'kali') {
    G.turn.kaliDouble = true;
    log(`🔥 卡莉「引爆」：本回合消除得分 ×2！`, 'system');
  } else if (p.character === 'eo') {
    // 從預備區自由補牌（在下次補牌時生效）
    G.turn.eoGuide = true;
    log(`❄ 艾歐「引導」：本回合補牌時可從預備區選牌。`, 'system');
  } else if (p.character === 'siel') {
    // 席爾「虛空召喚」：從棄牌堆取任意 1 張，推入個人星陣任意邊緣
    if (G.discard.length === 0) { log(`席爾「虛空召喚」：棄牌堆為空。`, 'system'); p.characterActiveUsed = false; }
    else {
      let chosen = null;
      await new Promise(resolve => {
        openModal({
          title: '席爾虛空召喚：從棄牌堆選 1 張',
          body: () => {
            const wrap = el('div', { class: 'pick-grid' });
            G.discard.forEach((card, i) => {
              const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
              const div = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
                onclick: () => {
                  chosen = G.discard.splice(i, 1)[0];
                  closeModal(); resolve();
                }
              });
              div.innerHTML = `<div class="icon">${shapeSVG(card.shape, e.color, 40)}</div><div class="label">${e.en.toUpperCase()}</div><div class="shape-label">${s.name}</div>`;
              wrap.appendChild(div);
            });
            return wrap;
          },
          actions: [{ label: '取消', onclick: () => { closeModal(); resolve(); } }]
        });
      });
      if (chosen) {
        // 選擇推入方向和位置
        await new Promise(resolve => {
          openModal({
            title: '席爾虛空召喚：選擇推入方向',
            body: () => {
              const wrap = el('div', { style: 'display:grid;grid-template-columns:1fr 1fr;gap:8px' });
              const dirs = [
                { dir: 'down', label: '從上推入（選列 0-2）' },
                { dir: 'up', label: '從下推入（選列 0-2）' },
                { dir: 'right', label: '從左推入（選行 0-2）' },
                { dir: 'left', label: '從右推入（選行 0-2）' },
              ];
              dirs.forEach(({ dir, label }) => {
                const btn = el('button', { style: 'padding:10px;cursor:pointer', onclick: () => {
                  closeModal();
                  // pick index
                  openModal({
                    title: `席爾虛空召喚：選擇${dir === 'down' || dir === 'up' ? '列' : '行'}（0-2）`,
                    body: () => {
                      const w = el('div', { style: 'display:flex;gap:8px' });
                      [0, 1, 2].forEach(idx => {
                        const b = el('button', { style: 'flex:1;padding:12px;cursor:pointer;font-size:1.2em', onclick: async () => {
                          closeModal();
                          const pushed = pushIntoGrid3x3(p.personalGrid, chosen, dir, idx);
                          log(`✨ 席爾「虛空召喚」：將牌推入個人星陣。`, 'system');
                          if (pushed) await handlePushedOut(pushed, p, p.personalGrid);
                          await resolveCascades(p.personalGrid, p);
                          render(); resolve();
                        }});
                        b.textContent = String(idx);
                        w.appendChild(b);
                      });
                      return w;
                    },
                    actions: []
                  });
                }});
                btn.textContent = label;
                wrap.appendChild(btn);
              });
              return wrap;
            },
            actions: [{ label: '取消', onclick: () => { G.discard.push(chosen); closeModal(); resolve(); } }]
          });
        });
      }
    }
  } else if (p.character === 'luna') {
    // 露娜「輻射爆」：移除所有觀測任務，重抽（移除數+1）張
    const removedCount = p.quests.length;
    if (removedCount === 0) {
      log(`🌟 露娜「輻射爆」：無任務可移除。`, 'system');
      p.characterActiveUsed = false;
    } else {
      // 將任務底牌還入棄牌堆（只還卡牌本身，不是任務物件）
      p.quests.forEach(q => { if (q.card) G.discard.push(q.card); });
      p.quests = [];
      const drawCount = removedCount + 1;
      const newQuests = [];
      const allQuestKeys = Object.keys(QUESTS);
      for (let i = 0; i < drawCount; i++) {
        // 從任務能量中隨機補（選不重複能量，從牌庫抽卡作為任務底牌）
        const available = allQuestKeys.filter(k => !newQuests.some(q => q.energy === k));
        if (available.length === 0) break;
        const key = available[Math.floor(Math.random() * available.length)];
        const drawn = drawN(G, 1);
        const card = drawn.length ? drawn[0] : null;
        newQuests.push({ energy: key, card });
      }
      p.quests = newQuests.slice(0, effectiveQuestLimit(p));
      log(`🌟 露娜「輻射爆」：移除 ${removedCount} 個任務，重抽 ${p.quests.length} 個新任務！`, 'score');
    }
  } else if (p.character === 'ryk') {
    // 瑞克「置換」：抽 1 張加入手牌，並將手牌任 1 張與星陣中任 1 張互換
    const d = drawN(G, 1);
    if (d.length) { p.hand.push(d[0]); log(`瑞克「置換」：抽 1 張牌加入手牌。`, 'system'); }
    if (p.hand.length === 0) { render(); return; }
    // 選手牌
    let handCard = null; let handIdx = -1;
    await new Promise(resolve => {
      openModal({
        title: '瑞克置換：選擇手牌中要互換的牌',
        body: () => {
          const wrap = el('div', { class: 'pick-grid' });
          p.hand.forEach((card, i) => {
            const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
            const div = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
              onclick: () => { handCard = card; handIdx = i; closeModal(); resolve(); }
            });
            div.innerHTML = `<div class="icon">${shapeSVG(card.shape, e.color, 40)}</div><div class="label">${e.en.toUpperCase()}</div><div class="shape-label">${s.name}</div>`;
            wrap.appendChild(div);
          });
          return wrap;
        },
        actions: [{ label: '跳過互換', onclick: () => { closeModal(); resolve(); } }]
      });
    });
    if (handCard !== null) {
      // 選星陣格子（個人 or 中央）
      log(`瑞克「置換」：請點選星陣中要互換的格子。`, 'system');
      UI.awaiting = {
        type: 'rykSwapGrid',
        hint: '瑞克「置換」：點選星陣中要互換的格子。',
        handCard, handIdx,
        onPickGrid: async (grid, r, c) => {
          UI.awaiting = null;
          if (grid[r][c] === null) { render(); return; }
          const gridCard = grid[r][c];
          p.hand[handIdx] = gridCard;
          grid[r][c] = handCard;
          log(`瑞克「置換」：手牌 ${cardLabel(handCard)} ↔ 星陣 ${cardLabel(gridCard)}。`, 'system');
          await resolveCascades(grid, p);
          render();
        }
      };
    }
  } else if (p.character === 'tavi') {
    // 塔薇「疊加」：從棄牌堆/牌庫/預備區合計取 3 張，其中 2 張可放置為任務
    const taken = [];
    for (let i = 0; i < 3; i++) {
      await new Promise(resolve => {
        const opts = [];
        if (G.discard.length > 0) opts.push('discard');
        if (G.deck.length > 0) opts.push('deck');
        if (G.reserve && G.reserve.length > 0) opts.push('reserve');
        if (opts.length === 0) { resolve(); return; }
        openModal({
          title: `塔薇疊加：取第 ${i+1} 張（共 3 張），選擇來源`,
          body: () => {
            const wrap = el('div', { style: 'display:flex;flex-direction:column;gap:10px' });
            if (opts.includes('discard')) {
              const btn = el('button', { style: 'padding:10px;cursor:pointer', onclick: () => {
                closeModal();
                openModal({
                  title: '從棄牌堆選 1 張',
                  body: () => {
                    const w = el('div', { class: 'pick-grid' });
                    G.discard.forEach((c, di) => {
                      const e = ENERGY_BY[c.energy], s = SHAPE_BY[c.shape];
                      const d = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
                        onclick: () => { taken.push(G.discard.splice(di, 1)[0]); closeModal(); resolve(); }
                      });
                      d.innerHTML = `<div class="icon">${shapeSVG(c.shape, e.color, 40)}</div><div class="label">${e.en.toUpperCase()}</div><div class="shape-label">${s.name}</div>`;
                      w.appendChild(d);
                    });
                    return w;
                  }, actions: []
                });
              }});
              btn.textContent = '從棄牌堆取';
              wrap.appendChild(btn);
            }
            if (opts.includes('deck')) {
              const btn = el('button', { style: 'padding:10px;cursor:pointer', onclick: () => {
                const d = drawN(G, 1); if (d.length) taken.push(d[0]);
                closeModal(); resolve();
              }});
              btn.textContent = '從牌庫頂取';
              wrap.appendChild(btn);
            }
            if (opts.includes('reserve')) {
              const btn = el('button', { style: 'padding:10px;cursor:pointer', onclick: () => {
                closeModal();
                openModal({
                  title: '從預備區選 1 張',
                  body: () => {
                    const w = el('div', { class: 'pick-grid' });
                    G.reserve.forEach((c, ri) => {
                      const e = ENERGY_BY[c.energy], s = SHAPE_BY[c.shape];
                      const d = el('div', { class: 'hand-card', style: `--cc: ${e.color}; cursor:pointer;`,
                        onclick: () => { taken.push(G.reserve.splice(ri, 1)[0]); refillReserve(); closeModal(); resolve(); }
                      });
                      d.innerHTML = `<div class="icon">${shapeSVG(c.shape, e.color, 40)}</div><div class="label">${e.en.toUpperCase()}</div><div class="shape-label">${s.name}</div>`;
                      w.appendChild(d);
                    });
                    return w;
                  }, actions: []
                });
              }});
              btn.textContent = '從預備區取';
              wrap.appendChild(btn);
            }
            return wrap;
          },
          actions: []
        });
      });
    }
    // 將取到的牌：最多 2 張設為任務，其餘加入手牌
    log(`✨ 塔薇「疊加」：取得 ${taken.length} 張牌。`, 'system');
    let questsPlaced = 0;
    for (const card of taken) {
      const canSetQuest = questsPlaced < 2 && p.quests.length < effectiveQuestLimit(p);
      if (!canSetQuest) { p.hand.push(card); continue; }
      const setAsQuest = await new Promise(resolve => {
        const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
        openModal({
          title: '塔薇疊加：加入手牌還是設為任務？',
          bodyHtml: `<div style="text-align:center"><div style="font-size:2em">${shapeSVG(card.shape, e.color, 48)}</div><div>${e.name} ${s.name}</div></div>`,
          actions: [
            { label: '加入手牌', onclick: () => { closeModal(); resolve(false); } },
            { label: '設為觀測任務', primary: true, onclick: () => { closeModal(); resolve(true); } }
          ]
        });
      });
      if (setAsQuest) { p.quests.push({ energy: card.energy, card }); questsPlaced++; }
      else { p.hand.push(card); }
    }
  }
  render();
}

async function eoPassiveCycle(cp) {
  if (cp.eoPassiveUsedThisTurn || !G.reserve || G.reserve.length === 0) return;
  const state = { selected: [] };
  return new Promise(resolve => {
    const update = () => {
      document.querySelectorAll('.modal-bg').forEach(n => n.remove());
      openModal({
        title: `艾歐被動：已選 ${state.selected.length} 張（可選 1～3）`,
        body: () => {
          const wrap = el('div', { class: 'pick-grid' });
          G.reserve.forEach((card, i) => {
            const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
            const picked = state.selected.includes(i);
            const div = el('div', { class: 'hand-card' + (picked ? ' selected' : ''), style: `--cc: ${e.color}; cursor:pointer;`,
              onclick: () => {
                if (picked) state.selected = state.selected.filter(x => x !== i);
                else if (state.selected.length < 3) state.selected.push(i);
                update();
              }
            });
            div.innerHTML = `<div class="icon">${shapeSVG(card.shape, e.color, 40)}</div><div class="label">${e.en.toUpperCase()}</div><div class="shape-label">${s.name}</div>`;
            wrap.appendChild(div);
          });
          return wrap;
        },
        actions: [
          { label: '取消', onclick: () => { closeModal(); resolve(); } },
          { label: `循環 ${state.selected.length} 張`, primary: true, onclick: () => {
            const n = state.selected.length;
            if (n === 0) { closeModal(); resolve(); return; }
            const removed = state.selected.sort((a, b) => b - a).map(i => G.reserve.splice(i, 1)[0]);
            removed.forEach(c => G.discard.push(c));
            const drawn = drawN(G, n);
            drawn.forEach(c => G.reserve.push(c));
            cp.eoPassiveUsedThisTurn = true;
            log(`❄ 艾歐被動：循環 ${n} 張預備區牌。`, 'system');
            closeModal(); render(); resolve();
          }}
        ]
      });
    };
    update();
  });
}


// ========== 18. UI 渲染 ==========
const $ = (sel, root = document) => root.querySelector(sel);
function el(tag, attrs = {}, ...children) {
  const n = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') n.className = attrs[k];
    else if (k === 'style') n.style.cssText = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === 'html') n.innerHTML = attrs[k];
    else n.setAttribute(k, attrs[k]);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (Array.isArray(c)) c.forEach(x => n.appendChild(typeof x === 'string' ? document.createTextNode(x) : x));
    else n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return n;
}

function renderInstructions() {
  if (UI.awaiting) {
    return el('div', { class: 'instructions' }, UI.awaiting.hint || '請操作…');
  }
  const cp = G.players[G.currentPlayer];
  if (cp.ai) return el('div', { class: 'instructions' }, `${cp.name} 思考中…`);

function renderGrid(grid, gridType, cp) {
  const gridId = gridType === 'central' ? 'central' : `personal-${G.currentPlayer}`;
  const targetGrid = gridType === 'central' ? G.centralGrid : cp.personalGrid;
  const canPush = canPushNow() || (UI.awaiting && UI.awaiting.type === 'meteorAbilityPush');
  const frame = el('div', { class: 'grid-frame' + (gridType === 'central' ? ' central-frame' : '') });
  const gridEl = el('div', { class: 'grid', 'data-grid-id': gridId });

  // Build 5×5: row 0 = top arrows, rows 1-3 = cards + side arrows, row 4 = bottom arrows
  for (let row5 = 0; row5 < 5; row5++) {
    for (let col5 = 0; col5 < 5; col5++) {
      const isTopRow = row5 === 0, isBotRow = row5 === 4;
      const isLeftCol = col5 === 0, isRightCol = col5 === 4;
      const gr = row5 - 1, gc = col5 - 1; // inner grid coords

      if (isTopRow && isLeftCol || isTopRow && isRightCol || isBotRow && isLeftCol || isBotRow && isRightCol) {
        // Corners: blank
        gridEl.appendChild(el('div', { class: 'grid-corner' }));
      } else if (isTopRow) {
        const idx = col5 - 1;
        const arrow = el('div', { class: 'grid-arrow', title: `從上推入列${idx}` }, '↓');
        if (canPush) {
          arrow.classList.add('active');
          arrow.addEventListener('click', () => onPushClick(targetGrid, 'down', idx));
        }
        gridEl.appendChild(arrow);
      } else if (isBotRow) {
        const idx = col5 - 1;
        const arrow = el('div', { class: 'grid-arrow', title: `從下推入列${idx}` }, '↑');
        if (canPush) {
          arrow.classList.add('active');
          arrow.addEventListener('click', () => onPushClick(targetGrid, 'up', idx));
        }
        gridEl.appendChild(arrow);
      } else if (isLeftCol) {
        const idx = row5 - 1;
        const arrow = el('div', { class: 'grid-arrow', title: `從左推入行${idx}` }, '→');
        if (canPush) {
          arrow.classList.add('active');
          arrow.addEventListener('click', () => onPushClick(targetGrid, 'right', idx));
        }
        gridEl.appendChild(arrow);
      } else if (isRightCol) {
        const idx = row5 - 1;
        const arrow = el('div', { class: 'grid-arrow', title: `從右推入行${idx}` }, '←');
        if (canPush) {
          arrow.classList.add('active');
          arrow.addEventListener('click', () => onPushClick(targetGrid, 'left', idx));
        }
        gridEl.appendChild(arrow);
      } else {
        // Inner card cell
        const card = grid[gr][gc];
        if (card) {
          gridEl.appendChild(renderStarCard(card, targetGrid, gr, gc));
        } else {
          gridEl.appendChild(el('div', { class: 'grid-cell empty' }));
        }
      }
    }
  }
  frame.appendChild(gridEl);
  return frame;
}

function renderStarCard(card, targetGrid, gr, gc) {
  const e = ENERGY_BY[card.energy], s = SHAPE_BY[card.shape];
  const div = el('div', { class: 'star-card', style: `--cc: ${e.color}` });

// ========== AI 回合 ==========
// AI 評估某個推法的得分潛力
function aiScorePush(grid, card, dir, idx) {
  const clone = grid.map(r => [...r]);
  // 模擬推入
  let pushed = null;
  const tmpCard = { ...card };
  if (dir === 'down') {
    pushed = clone[2][idx];
    for (let r = 2; r > 0; r--) clone[r][idx] = clone[r-1][idx];
    clone[0][idx] = tmpCard;
  } else if (dir === 'up') {
    pushed = clone[0][idx];
    for (let r = 0; r < 2; r++) clone[r][idx] = clone[r+1][idx];
    clone[2][idx] = tmpCard;
  } else if (dir === 'right') {
    pushed = clone[idx][2];
    for (let c = 2; c > 0; c--) clone[idx][c] = clone[idx][c-1];
    clone[idx][0] = tmpCard;
  } else {
    pushed = clone[idx][0];
    for (let c = 0; c < 2; c++) clone[idx][c] = clone[idx][c+1];
    clone[idx][2] = tmpCard;
  }
  const matches = findMatchesInGrid(clone);
  return matches.reduce((s, m) => s + m.score, 0);
}

async function maybeRunAITurn() {
  if (!G || G.phase !== 'playing') return;
  const cp = G.players[G.currentPlayer];
  if (!cp.ai) return;
  await delay(700);
  initTurnState();

  // AI: 若手牌為空則星塵凝聚
  if (cp.hand.length === 0) { await doStardust(cp); return; }

  // AI: 選最佳手牌+位置（試所有組合）
  if (cp.hand.length > 0) {
    const dirs = ['down', 'up', 'left', 'right'];
    let bestScore = -1, bestCardIdx = 0, bestGrid = G.centralGrid, bestDir = 'down', bestIdx = 0;
    // 試個人和中央
    const gridsToTry = [
      { grid: cp.personalGrid, isCentral: false },
      { grid: G.centralGrid, isCentral: true },
    ];
    for (let ci = 0; ci < cp.hand.length; ci++) {
      for (const { grid, isCentral } of gridsToTry) {
        for (const dir of dirs) {
          for (let i = 0; i < 3; i++) {
            const score = aiScorePush(grid, cp.hand[ci], dir, i);
            // 中央星陣加一點偏好（放標記有額外收益）
            const bonus = isCentral ? 1 : 0;
            if (score + bonus > bestScore) {
              bestScore = score + bonus;
              bestCardIdx = ci;
              bestGrid = grid;
              bestDir = dir;
              bestIdx = i;
            }
          }
        }
      }
    }
    // 若完全沒得分，隨機選個人星陣（避免全推中央）
    if (bestScore === 0 && Math.random() < 0.4) {
      bestGrid = cp.personalGrid;
      bestDir = dirs[Math.floor(Math.random() * dirs.length)];
      bestIdx = Math.floor(Math.random() * 3);
    }
    const card = cp.hand.splice(bestCardIdx, 1)[0];
    const isCentral = bestGrid === G.centralGrid;
    const pushed = pushIntoGrid3x3(bestGrid, card, bestDir, bestIdx);
    G.turn.pushed = true;
    const gridName = isCentral ? '中央星陣' : '個人星陣';
    if (isCentral) {
      const [mr, mc] = getInsertedCell(bestDir, bestIdx);
      G.centralMarkers[mr][mc] = cp.idx;
      log(`${cp.name} 推入 ${cardLabel(card)} 進${gridName}並放下標記。`);
    } else {
      log(`${cp.name} 推入 ${cardLabel(card)} 進${gridName}。`);
    }
    if (pushed) {
      log(`${cp.name} 推出了 ${cardLabel(pushed)}。`);
      G.discard.push(pushed);
    }
    await resolveCascades(bestGrid, cp);
  }

  // AI: 結算任務
  for (let i = cp.quests.length - 1; i >= 0; i--) {
    const q = cp.quests[i];
    const Q = QUESTS[q.energy];
    if (Q && Q.check(G, cp, G.turn)) await completeQuest(cp, i);
  }

  // AI: 從預備區取 1 張
  await pickFromReserve(cp);
  render();
  await delay(400);
  await endTurn();
}

async function pushState() {
  if (!roomRef || isSyncing || !G) return;
  try {
    isPushing = true;
    const snapshot = JSON.parse(JSON.stringify(G));
    await roomRef.child('state').set(snapshot);
    console.log('[Online] pushState 成功，phase:', G.phase);
  } catch(e) {
    console.error('[Online] pushState 失敗:', e);
    const msg = e.code === 'PERMISSION_DENIED'
      ? 'Firebase 權限不足（PERMISSION_DENIED），請將資料庫規則設為允許讀寫'
      : e.message || String(e);
    showOnlineError(msg);
  } finally {
    // 延遲清除：讓 Firebase 本地 listener 先觸發並被跳過
    setTimeout(() => { isPushing = false; }, 300);
  }
}

function fixGrid(g) {
  if (!g) return [[null,null,null],[null,null,null],[null,null,null]];
  const result = [];
  for (let r = 0; r < 3; r++) {
    result.push([]);
    for (let c = 0; c < 3; c++) {
      result[r].push((g[r] && g[r][c] !== undefined) ? g[r][c] : null);
    }
  }
  return result;
}

function listenRoom(code) {
  roomRef = db.ref('rooms/' + code);
  roomRef.child('state').on('value', snap => {
    try {
      if (!snap.exists() || isSyncing) return;
      // playing 階段：跳過自己推送的 echo，避免無意義的重複 render
      if (isPushing && G && G.phase === 'playing') return;
      const newState = snap.val();
      if (!newState) return;
      console.log('[Online] 收到狀態更新，phase:', newState.phase);
      isSyncing = true;
      G = newState;
      G.centralGrid = fixGrid(G.centralGrid);
      G.centralMarkers = fixGrid(G.centralMarkers);

      // ★ Firebase 會省略空陣列（[] → undefined），在選牌階段尤其嚴重，必須補回
      const toArr = v => Array.isArray(v) ? v : (v && typeof v === 'object') ? Object.values(v) : [];
      if (!Array.isArray(G.players)) G.players = toArr(G.players);
      if (!Array.isArray(G.deck))    G.deck    = toArr(G.deck);
      if (!Array.isArray(G.discard)) G.discard = toArr(G.discard);
      if (!Array.isArray(G.reserve)) G.reserve = toArr(G.reserve);
      if (!Array.isArray(G.log))     G.log     = toArr(G.log);
      if (G.currentSetupCards && !Array.isArray(G.currentSetupCards))
        G.currentSetupCards = Object.values(G.currentSetupCards);
      for (const p of G.players) {
        if (!Array.isArray(p.hand))   p.hand   = toArr(p.hand);
        if (!Array.isArray(p.quests)) p.quests = toArr(p.quests);
        if (p.personalGrid) p.personalGrid = fixGrid(p.personalGrid);
      }
      // 修復 takenChars：JSON 序列化將 Set 轉為 {}，需重建為 Set
      if (G.takenChars !== undefined) {
        const taken = new Set();
        G.players.forEach(p => { if (p.character) taken.add(p.character); });
        G.takenChars = taken;
      }
      isSyncing = false;

      // 選牌階段：若已有彈窗開啟則不強制 render，避免蓋掉正在操作的彈窗
      const hasPickModal = !!document.querySelector('.modal-bg');
      if (!hasPickModal) render();

      // 觸發選擇階段流程（各自在自己的裝置處理）
      if (G.phase === 'character-pick' && !hasPickModal) {
        onlineHandleCharacterPickPhase();
      } else if (G.phase === 'setup-pick' && !hasPickModal) {
        onlineHandleSetupPickPhase();
      }

      // host 負責跑 AI
      const cp = G && G.players && G.players[G.currentPlayer];
      if (cp && cp.ai && myPlayerIdx === 0 && G.phase === 'playing') {
        setTimeout(maybeRunAITurn, 800);
      }
    } catch(e) {
      isSyncing = false;
      console.error('[Online] listenRoom 處理狀態時發生錯誤:', e);
      showOnlineError('處理狀態時發生錯誤：' + (e.message || String(e)));
    }
  }, err => {
    // Firebase 讀取錯誤（如 PERMISSION_DENIED）
    console.error('[Online] Firebase listener 錯誤:', err);
    const msg = err.code === 'PERMISSION_DENIED'
      ? 'Firebase 權限不足（PERMISSION_DENIED）。請將 Firebase 資料庫規則改為允許讀取（".read": true）'
      : err.message || String(err);
    showOnlineError(msg);
  });
}

// ========== 連線模式：角色選擇階段處理 ==========
function onlineHandleCharacterPickPhase() {
  if (!G || G.phase !== 'character-pick') return;

  // 所有人選完 → Host 負責過渡到開局選牌
  if (G.characterPickIdx >= G.players.length) {
    if (myPlayerIdx === 0) {
      G.phase = 'setup-pick';
      G.setupPickIdx = 0;
      // 為第一位非 AI 玩家預抽 5 張牌
      const firstP = G.players[0];
      if (!firstP.ai) {
        G.currentSetupCards = drawN(G, 5);
      }
      pushState();
    }
    return;
  }

  const p = G.players[G.characterPickIdx];

  // AI 角色 → Host 自動選
  if (p.ai) {
    if (myPlayerIdx === 0) {
      const available = Object.values(CHARACTERS).filter(c => !G.takenChars.has(c.id));
      const pick = available[Math.floor(Math.random() * available.length)];
      p.character = pick.id;
      G.takenChars.add(pick.id);
      log(`${p.name} 選擇了 ${pick.name}（${ENERGY_BY[pick.energy].en}）。`, 'system');
      G.characterPickIdx++;
      pushState();
    }
    return;
  }

  // 輪到自己選角色 → 顯示彈窗
  if (p.idx === myPlayerIdx) {
    if (!document.querySelector('.modal-bg')) {
      nextCharacterPick(); // 開角色選擇 modal
    }
  }
  // 非自己的回合 → 等待對方裝置推送
}

// ========== 連線模式：開局選牌階段處理 ==========
function onlineHandleSetupPickPhase() {
  if (!G || G.phase !== 'setup-pick') return;

  // 所有人選完 → Host 負責過渡到遊戲
  if (G.setupPickIdx >= G.players.length) {
    if (myPlayerIdx === 0) {
      G.phase = 'playing';
      G.currentSetupCards = null;
      log(`系統：遊戲開始！由 ${G.players[G.currentPlayer].name} 先手。`, 'system');
      pushState();
      render();
      setTimeout(maybeRunAITurn, 600);
    }
    return;
  }

  const p = G.players[G.setupPickIdx];

  // AI 玩家 → Host 自動選
  if (p.ai) {
    if (myPlayerIdx === 0) {
      const five = G.currentSetupCards || drawN(G, 5);
      const sorted = [...five].sort((a, b) => SHAPE_BY[b.shape].stars - SHAPE_BY[a.shape].stars);
      p.hand = [sorted[1], sorted[2], sorted[3]];
      p.quests = [{ energy: sorted[0].energy, card: sorted[0] }];
      G.discard.push(sorted[4]);
      log(`${p.name} 完成開局抽牌。`, 'system');
      G.setupPickIdx++;
      G.currentSetupCards = null;
      // 為下一位非 AI 玩家預抽牌
      if (G.setupPickIdx < G.players.length) {
        const nextP = G.players[G.setupPickIdx];
        if (!nextP.ai) G.currentSetupCards = drawN(G, 5);
      }
      pushState();
    }
    return;
  }

  // 非本地玩家 → Host 確保已幫他們抽牌並推送
  if (p.idx !== myPlayerIdx) {
    if (myPlayerIdx === 0 && !G.currentSetupCards) {
      G.currentSetupCards = drawN(G, 5);
      pushState();
    }
    return; // 等待對方裝置收到 currentSetupCards 後開彈窗
  }

  // 輪到自己 → 開選牌彈窗
  if (G.currentSetupCards && !document.querySelector('.modal-bg')) {
    openSetupPickModal(p, G.currentSetupCards);
  } else if (!G.currentSetupCards && myPlayerIdx === 0) {
    // Host 自己的牌還沒抽（理論上 beginSetupPick 應已處理）
    G.currentSetupCards = drawN(G, 5);
    pushState();
  }
}

async function doJoinRoom() {
  const code = (document.getElementById('joinCodeInp')?.value || '').toUpperCase().trim();
  const name = document.getElementById('joinNameInp')?.value || 'Walker';
  const statusEl = document.getElementById('joinStatus');
  if (!code) { statusEl.textContent = '請輸入房間碼'; return; }
  statusEl.textContent = '連線中…';
  try {
    const snap = await db.ref('rooms/' + code).get();
    if (!snap.exists()) { statusEl.textContent = '找不到此房間，請確認房間碼'; return; }
    const players = snap.val().players || {};
    const takenIdxs = Object.keys(players).map(Number);
    let myIdx = 1;
    while (takenIdxs.includes(myIdx)) myIdx++;
    myPlayerIdx = myIdx;
    await db.ref('rooms/' + code + '/players/' + myIdx).set({ name, ready: true });
    listenRoom(code);
    statusEl.innerHTML = `✅ 已加入！你是<b style="color:#ffd6a8"> 玩家 ${myIdx + 1}</b>，等待房主開始遊戲…`;
  } catch(e) {
    console.error('[Online] doJoinRoom 失敗:', e);
    const msg = e.code === 'PERMISSION_DENIED'
      ? '⛔ Firebase 權限不足。請前往 Firebase Console → Realtime Database → 規則，將 .read 和 .write 都改為 true'
      : '❌ 連線失敗：' + (e.message || String(e));
    statusEl.innerHTML = `<span style="color:#ff6b6b">${msg}</span>`;
  }
}

  const joinedPlayers = snap.exists() ? snap.val() : {};
  // 更新 host 名字
  await db.ref('rooms/' + code + '/players/0').set({ name: myName, ready: true });
  const players = [];
  for (let i = 0; i < count; i++) {
    const name = joinedPlayers[i]?.name || (i === 0 ? myName : `玩家 ${i + 1}`);

  await pushState();
}

    if (G.phase === 'setup-pick' && G.setupPickIdx < G.players.length && G.players[G.setupPickIdx]?.idx !== myPlayerIdx) {
      const waiting = G.players[G.setupPickIdx];
      return el('div', { class: 'instructions', style: 'background:rgba(30,60,120,0.4);color:#a8c8ff;' },
        `⏳ 等待 ${waiting?.name || ''} 完成開局選牌…`
      );
    }
    // 遊戲進行中：等待對手操作
    if (G.phase === 'playing' && !isMyTurn()) {
      const cp = G.players[G.currentPlayer];
      return el('div', { class: 'instructions', style: 'background:rgba(100,50,50,0.3);color:#ffb8b8;' },
        `⏳ 等待 ${cp?.name || ''} 操作中…`
      );
    }
  }
  return _origRenderInstructions();
};

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', () => {
  render();
});
</script>
</body>
</html>
